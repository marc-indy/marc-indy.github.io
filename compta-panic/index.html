<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compta-Panic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&family=Courier+Prime&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #FFF8E7;
            font-family: 'Nunito', sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            touch-action: none;
        }

        /* Landscape warning */
        @media (orientation: landscape) and (max-height: 500px) {
            body::after {
                content: 'Tournez votre appareil 📱';
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(0, 0, 0, 0.95);
                color: white;
                font-size: 24px;
                font-family: 'Nunito', sans-serif;
                z-index: 9999;
            }
        }

        /* Safe area padding */
        body {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
    </style>
</head>

<body>
    <canvas id="game-canvas" role="application" aria-label="Compta-Panic — jeu de survie entrepreneuriale"></canvas>
    <script type="module" src="src/game-loop.js"></script>
</body>

</html>
