<!-- Tampon or — circulaire, texte EXPERT, orné, doré. 48×48 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD700"/>
      <stop offset="0.4" stop-color="#DAA520"/>
      <stop offset="1" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF4A3"/>
      <stop offset="1" stop-color="#DAA520"/>
    </linearGradient>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#DAA520" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g filter="url(#goldGlow)">
    <!-- Outer ornate ring -->
    <circle cx="24" cy="24" r="22" fill="none" stroke="url(#goldGrad)" stroke-width="3.5"/>
    <!-- Ornamental border — scalloped -->
    <circle cx="24" cy="24" r="19" fill="none" stroke="#DAA520" stroke-width="1" stroke-dasharray="2,2" opacity="0.8"/>
    <circle cx="24" cy="24" r="16" fill="none" stroke="#DAA520" stroke-width="0.8" opacity="0.6"/>
    <!-- Corner flourishes -->
    <circle cx="24" cy="3" r="2" fill="#FFD700" opacity="0.8"/>
    <circle cx="24" cy="45" r="2" fill="#FFD700" opacity="0.8"/>
    <circle cx="3" cy="24" r="2" fill="#FFD700" opacity="0.8"/>
    <circle cx="45" cy="24" r="2" fill="#FFD700" opacity="0.8"/>
    <!-- Diagonal ornaments -->
    <circle cx="8" cy="8" r="1.5" fill="#B8860B" opacity="0.6"/>
    <circle cx="40" cy="8" r="1.5" fill="#B8860B" opacity="0.6"/>
    <circle cx="8" cy="40" r="1.5" fill="#B8860B" opacity="0.6"/>
    <circle cx="40" cy="40" r="1.5" fill="#B8860B" opacity="0.6"/>
    <!-- Text: EXPERT -->
    <text x="24" y="22" text-anchor="middle" font-family="Courier Prime, monospace" font-size="9" font-weight="bold" fill="url(#goldShine)" letter-spacing="2">EXPERT</text>
    <!-- Laurel wreath bottom -->
    <path d="M14 30 C16 34 20 36 24 36" stroke="#DAA520" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M34 30 C32 34 28 36 24 36" stroke="#DAA520" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="14" cy="28" r="1.5" fill="#FFD700" opacity="0.7"/>
    <circle cx="34" cy="28" r="1.5" fill="#FFD700" opacity="0.7"/>
    <circle cx="17" cy="32" r="1" fill="#FFD700" opacity="0.6"/>
    <circle cx="31" cy="32" r="1" fill="#FFD700" opacity="0.6"/>
    <!-- Central star -->
    <polygon points="24,37 25,39 27,39 25.5,40.5 26,42.5 24,41.5 22,42.5 22.5,40.5 21,39 23,39" fill="#FFD700" opacity="0.8"/>
  </g>
</svg>
