<!-- Patron — silhouette noire, posture autoritaire, doigt pointé. 150×250 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 250" width="150" height="250">
  <defs>
    <linearGradient id="patronBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#922B21"/>
      <stop offset="0.3" stop-color="#1A1A1A"/>
      <stop offset="1" stop-color="#0D0D0D"/>
    </linearGradient>
    <filter id="patronGlow" x="-15%" y="-10%" width="130%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#922B21" flood-opacity="0.3"/>
    </filter>
    <filter id="patronShadow" x="-10%" y="-5%" width="120%" height="110%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Menacing red backglow -->
  <ellipse cx="75" cy="125" rx="60" ry="100" fill="#922B21" opacity="0.08" filter="url(#patronGlow)"/>
  <g filter="url(#patronShadow)">
    <!-- Shoes — polished -->
    <ellipse cx="52" cy="244" rx="16" ry="6" fill="#0A0A0A"/>
    <ellipse cx="98" cy="244" rx="16" ry="6" fill="#0A0A0A"/>
    <!-- Legs — wide power stance -->
    <rect x="42" y="168" width="18" height="78" rx="5" fill="#0D0D0D"/>
    <rect x="90" y="168" width="18" height="78" rx="5" fill="#0D0D0D"/>
    <!-- Body — wide, authoritative -->
    <path d="M30 72 C24 95 22 130 28 170 L122 170 C128 130 126 95 120 72 Z" fill="url(#patronBody)" stroke="#0A0A0A" stroke-width="2"/>
    <!-- Power shoulders — exaggerated -->
    <path d="M30 72 C18 66 10 72 12 88 L32 84 Z" fill="#1A1A1A" stroke="#0A0A0A" stroke-width="1.5"/>
    <path d="M120 72 C132 66 140 72 138 88 L118 84 Z" fill="#1A1A1A" stroke="#0A0A0A" stroke-width="1.5"/>
    <!-- Left arm (at side, clenched fist) -->
    <path d="M12 88 C8 106 10 126 16 148" stroke="#0D0D0D" stroke-width="14" stroke-linecap="round" fill="none"/>
    <circle cx="16" cy="148" r="8" fill="#0D0D0D"/>
    <!-- Right arm — POINTING FINGER (key feature) -->
    <path d="M138 88 C142 100 144 108 142 118" stroke="#0D0D0D" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- Pointing hand and finger -->
    <g transform="translate(130 110) rotate(-25)">
      <circle cx="8" cy="0" r="8" fill="#FDDCAC"/>
      <!-- Pointing index finger -->
      <rect x="10" y="-3" width="24" height="6" rx="3" fill="#FDDCAC" stroke="#C9A07A" stroke-width="0.8"/>
      <!-- Other curled fingers -->
      <ellipse cx="6" cy="6" rx="5" ry="3" fill="#EBC89A"/>
    </g>
    <!-- Tie — red power tie -->
    <rect x="69" y="80" width="8" height="52" rx="2" fill="#922B21"/>
    <polygon points="69,80 77,80 76,88 70,88" fill="#7A2219"/>
    <!-- White shirt collar -->
    <path d="M60 72 L75 86 L90 72" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
    <!-- Neck -->
    <rect x="64" y="54" width="18" height="20" rx="5" fill="#FDDCAC"/>
    <!-- Head — large, imposing -->
    <ellipse cx="75" cy="36" rx="26" ry="30" fill="#1A1A1A"/>
    <!-- The face is mostly in shadow — just glowing eyes -->
    <!-- Left eye — glowing, menacing -->
    <circle cx="64" cy="32" r="4" fill="#922B21" opacity="0.6"/>
    <circle cx="64" cy="32" r="2" fill="#C0392B"/>
    <circle cx="63" cy="31" r="0.8" fill="#FFFFFF" opacity="0.8"/>
    <!-- Right eye -->
    <circle cx="86" cy="32" r="4" fill="#922B21" opacity="0.6"/>
    <circle cx="86" cy="32" r="2" fill="#C0392B"/>
    <circle cx="85" cy="31" r="0.8" fill="#FFFFFF" opacity="0.8"/>
    <!-- Slight mouth — thin, sinister -->
    <path d="M64 46 C68 48 82 48 86 46" stroke="#922B21" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
