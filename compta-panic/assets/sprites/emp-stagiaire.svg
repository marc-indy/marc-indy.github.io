<!-- Stagiaire — jeune 20 ans, hoodie gris, regard légèrement perdu. 40×40, badge -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Badge background — light gray, casual -->
  <rect width="40" height="40" rx="8" fill="#95A5A6"/>
  <rect x="1.5" y="1.5" width="37" height="37" rx="7" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  <!-- Hoodie torso -->
  <path d="M5 40 C5 27 9 24 20 24 C31 24 35 27 35 40 Z" fill="#7F8C8D"/>
  <!-- Hoodie center pocket -->
  <path d="M16 30 L16 36 L24 36 L24 30 C22 29 18 29 16 30" fill="#6D7D7E" stroke="#5A6A6B" stroke-width="0.8"/>
  <!-- Hoodie drawstrings -->
  <line x1="18" y1="25.5" x2="15" y2="32" stroke="#B0BEC5" stroke-width="1" stroke-linecap="round"/>
  <line x1="22" y1="25.5" x2="25" y2="32" stroke="#B0BEC5" stroke-width="1" stroke-linecap="round"/>
  <!-- Neck / hoodie collar -->
  <path d="M16 25 C16 22 18 21 20 21 C22 21 24 22 24 25 C22 24 18 24 16 25Z" fill="#8E9FA0"/>
  <!-- Head -->
  <ellipse cx="20" cy="17" rx="10.5" ry="11" fill="#FDDCAC"/>
  <!-- Hair — messy, youthful -->
  <path d="M9.5 14 C9.5 7 13 5 20 5 C27 5 30.5 7 30.5 14 L30.5 11 C30.5 7 25 4.5 20 4.5 C15 4.5 9.5 7 9.5 11 Z" fill="#4A3020"/>
  <!-- Messy hair top -->
  <path d="M14 7 C16 4 24 4 26 7 C24 5.5 22 5 20 5 C18 5 16 5.5 14 7Z" fill="#3D2518"/>
  <!-- Hair tufts going slightly up (messy) -->
  <path d="M12 9 C11 7 13 5.5 14 6" fill="none" stroke="#3D2518" stroke-width="2" stroke-linecap="round"/>
  <path d="M26 8 C28 6 29 7 28 9" fill="none" stroke="#3D2518" stroke-width="2" stroke-linecap="round"/>
  <!-- Eyes — slightly uncertain, big -->
  <ellipse cx="15.5" cy="17.5" rx="2.8" ry="3" fill="#FFFFFF"/>
  <circle cx="15.5" cy="17.5" r="2" fill="#4A3020"/>
  <circle cx="14.8" cy="16.8" r="0.7" fill="#FFFFFF"/>
  <ellipse cx="24.5" cy="17.5" rx="2.8" ry="3" fill="#FFFFFF"/>
  <circle cx="24.5" cy="17.5" r="2" fill="#4A3020"/>
  <circle cx="23.8" cy="16.8" r="0.7" fill="#FFFFFF"/>
  <!-- Slight confused eyebrows — one slightly raised -->
  <path d="M12.5 13.5 C13.5 12.5 17.5 12.8 18 13.5" fill="none" stroke="#3D2518" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M22 13 C22.5 12 26 12.5 27.5 14" fill="none" stroke="#3D2518" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M19.5 20 C19 21 20 21.5 21 21" fill="none" stroke="#C9A07A" stroke-width="0.8"/>
  <!-- Earnest smile — slightly uncertain but willing -->
  <path d="M17 23.5 C18.5 24.8 21.5 24.8 23 23.5" fill="none" stroke="#C07850" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Small sweat drop (overwhelmed feeling) -->
  <ellipse cx="28.5" cy="15" rx="2" ry="2.5" fill="#A8CCEE" opacity="0.85"/>
  <path d="M28.5 12.5 C28.5 12 29 12 28.5 13" fill="none" stroke="#A8CCEE" stroke-width="0.8"/>
</svg>
