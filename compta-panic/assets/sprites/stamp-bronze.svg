<!-- Tampon bronze — circulaire, texte VÉRIFIÉ, style tampon usé. 48×48 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bronzeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#CD7F32"/>
      <stop offset="0.5" stop-color="#B87333"/>
      <stop offset="1" stop-color="#8B5A2B"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="url(#bronzeGrad)" stroke-width="3" opacity="0.85"/>
  <!-- Inner ring -->
  <circle cx="24" cy="24" r="17" fill="none" stroke="#B87333" stroke-width="1.5" stroke-dasharray="3,1.5" opacity="0.7"/>
  <!-- Small decorative dots -->
  <circle cx="24" cy="4" r="1.5" fill="#CD7F32" opacity="0.6"/>
  <circle cx="24" cy="44" r="1.5" fill="#CD7F32" opacity="0.6"/>
  <circle cx="4" cy="24" r="1.5" fill="#CD7F32" opacity="0.6"/>
  <circle cx="44" cy="24" r="1.5" fill="#CD7F32" opacity="0.6"/>
  <!-- Text: VÉRIFIÉ -->
  <text x="24" y="22" text-anchor="middle" font-family="Courier Prime, monospace" font-size="8" font-weight="bold" fill="#B87333" letter-spacing="1" opacity="0.85">VÉRIFIÉ</text>
  <!-- Star below text -->
  <polygon points="24,28 25.5,31 29,31.5 26.5,33.5 27,37 24,35.5 21,37 21.5,33.5 19,31.5 22.5,31" fill="#CD7F32" opacity="0.7"/>
  <!-- Worn stamp texture -->
  <circle cx="14" cy="18" r="2" fill="#B87333" opacity="0.1"/>
  <circle cx="34" cy="30" r="1.5" fill="#B87333" opacity="0.08"/>
  <circle cx="18" cy="36" r="1" fill="#B87333" opacity="0.12"/>
</svg>
