<!-- Téléphone de bureau — style rétro, LED rouge. 40×30 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 30" width="40" height="30">
  <defs>
    <linearGradient id="phoneBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4A4A4A"/>
      <stop offset="1" stop-color="#2C2C2C"/>
    </linearGradient>
  </defs>
  <!-- Phone base -->
  <rect x="2" y="14" width="36" height="14" rx="4" fill="url(#phoneBody)" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- Keypad area -->
  <rect x="10" y="17" width="20" height="8" rx="2" fill="#3A3A3A"/>
  <!-- Number keys (3×3 grid + bottom row) -->
  <g fill="#5A5A5A">
    <rect x="12" y="18" width="4" height="2.5" rx="0.5"/>
    <rect x="18" y="18" width="4" height="2.5" rx="0.5"/>
    <rect x="24" y="18" width="4" height="2.5" rx="0.5"/>
    <rect x="12" y="22" width="4" height="2.5" rx="0.5"/>
    <rect x="18" y="22" width="4" height="2.5" rx="0.5"/>
    <rect x="24" y="22" width="4" height="2.5" rx="0.5"/>
  </g>
  <!-- Handset on cradle -->
  <path d="M4 14 C4 10 8 6 12 6 L28 6 C32 6 36 10 36 14" fill="none" stroke="#2C2C2C" stroke-width="5" stroke-linecap="round"/>
  <path d="M4 14 C4 10 8 6 12 6 L28 6 C32 6 36 10 36 14" fill="none" stroke="#3A3A3A" stroke-width="3" stroke-linecap="round"/>
  <!-- Earpiece -->
  <ellipse cx="6" cy="12" rx="5" ry="4" fill="#2C2C2C" stroke="#1A1A1A" stroke-width="1"/>
  <!-- Mouthpiece -->
  <ellipse cx="34" cy="12" rx="5" ry="4" fill="#2C2C2C" stroke="#1A1A1A" stroke-width="1"/>
  <!-- Speaker holes on earpiece -->
  <circle cx="5" cy="11" r="0.8" fill="#1A1A1A"/>
  <circle cx="7" cy="11" r="0.8" fill="#1A1A1A"/>
  <circle cx="5" cy="13" r="0.8" fill="#1A1A1A"/>
  <circle cx="7" cy="13" r="0.8" fill="#1A1A1A"/>
  <!-- Red LED indicator -->
  <circle cx="6" cy="20" r="2" fill="#E74C3C"/>
  <circle cx="6" cy="20" r="1" fill="#FF6B6B" opacity="0.8"/>
  <!-- Cord hint -->
  <path d="M34 26 C36 28 38 28 40 26" stroke="#2C2C2C" stroke-width="1.5" fill="none"/>
</svg>
