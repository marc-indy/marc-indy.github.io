<!-- Chat roux — assis dignement sur des factures, regard de supériorité sereine. 40×40, badge officiel -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="chatFur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E07828"/>
      <stop offset="1" stop-color="#C05A18"/>
    </linearGradient>
  </defs>
  <!-- Badge background — warm gold/orange tone -->
  <rect width="40" height="40" rx="8" fill="#F39C12"/>
  <rect x="1.5" y="1.5" width="37" height="37" rx="7" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <!-- Stack of invoices under cat (bottom) -->
  <g transform="translate(5 33)">
    <rect width="30" height="5" rx="1" fill="#FFFDF8" stroke="#D0C8B8" stroke-width="0.8" transform="rotate(-2)"/>
    <rect x="1" y="-3" width="28" height="5" rx="1" fill="#F0E8D8" stroke="#D0C8B8" stroke-width="0.8" transform="rotate(1)"/>
    <rect x="-1" y="-6" width="28" height="5" rx="1" fill="#FFFDF8" stroke="#D0C8B8" stroke-width="0.8" transform="rotate(-1)"/>
  </g>
  <!-- Cat body — seated, puffed chest -->
  <ellipse cx="20" cy="30" rx="10" ry="8" fill="url(#chatFur)" stroke="#B05010" stroke-width="1"/>
  <!-- Belly lighter patch -->
  <ellipse cx="20" cy="31" rx="6" ry="5" fill="#F0B060" opacity="0.8"/>
  <!-- Cat tail curled around -->
  <path d="M10 36 C8 34 7 30 9 28 C11 26 13 28 12 30" fill="none" stroke="#C05A18" stroke-width="3" stroke-linecap="round"/>
  <!-- Front paws -->
  <ellipse cx="14.5" cy="37" rx="3.5" ry="2.5" fill="url(#chatFur)" stroke="#B05010" stroke-width="0.8"/>
  <ellipse cx="25.5" cy="37" rx="3.5" ry="2.5" fill="url(#chatFur)" stroke="#B05010" stroke-width="0.8"/>
  <!-- Toe lines -->
  <line x1="12.5" y1="38.5" x2="13.5" y2="39" stroke="#8B4010" stroke-width="0.8"/>
  <line x1="14.5" y1="39" x2="14.5" y2="39.5" stroke="#8B4010" stroke-width="0.8"/>
  <line x1="16.5" y1="38.5" x2="15.5" y2="39" stroke="#8B4010" stroke-width="0.8"/>
  <line x1="23.5" y1="38.5" x2="24.5" y2="39" stroke="#8B4010" stroke-width="0.8"/>
  <line x1="25.5" y1="39" x2="25.5" y2="39.5" stroke="#8B4010" stroke-width="0.8"/>
  <line x1="27.5" y1="38.5" x2="26.5" y2="39" stroke="#8B4010" stroke-width="0.8"/>
  <!-- Head — round, noble -->
  <circle cx="20" cy="17" r="11" fill="url(#chatFur)" stroke="#B05010" stroke-width="1"/>
  <!-- Ears -->
  <polygon points="11,10 8,3 16,9" fill="url(#chatFur)" stroke="#B05010" stroke-width="0.8"/>
  <polygon points="12.5,9.5 10.5,5 15,8.5" fill="#F0C0A0" opacity="0.8"/>
  <polygon points="29,10 32,3 24,9" fill="url(#chatFur)" stroke="#B05010" stroke-width="0.8"/>
  <polygon points="27.5,9.5 29.5,5 25,8.5" fill="#F0C0A0" opacity="0.8"/>
  <!-- Forehead stripes (tabby) -->
  <path d="M17 10 C17 8.5 18 8 19 8" fill="none" stroke="#B05010" stroke-width="0.8"/>
  <path d="M20 9.5 C20 8 21 7.5 22 8" fill="none" stroke="#B05010" stroke-width="0.8"/>
  <!-- Eyes — half-lidded serenity / superiority -->
  <ellipse cx="15.5" cy="17" rx="3.5" ry="3" fill="#F0E050"/>
  <ellipse cx="15.5" cy="17.5" rx="1.5" ry="2.8" fill="#1A0A00"/>
  <circle cx="14.8" cy="16.2" r="0.7" fill="#FFFFFF" opacity="0.9"/>
  <!-- Half-lid over left eye -->
  <path d="M12 15.5 C13 14 18 14 19 15.5" fill="#D06018" opacity="0.7"/>
  <ellipse cx="24.5" cy="17" rx="3.5" ry="3" fill="#F0E050"/>
  <ellipse cx="24.5" cy="17.5" rx="1.5" ry="2.8" fill="#1A0A00"/>
  <circle cx="23.8" cy="16.2" r="0.7" fill="#FFFFFF" opacity="0.9"/>
  <!-- Half-lid over right eye -->
  <path d="M21 15.5 C22 14 27 14 28 15.5" fill="#D06018" opacity="0.7"/>
  <!-- Nose — small pink triangle -->
  <polygon points="20,21 18.5,19.5 21.5,19.5" fill="#E87070"/>
  <!-- Mouth -->
  <path d="M18.5 22 C19.5 22.5 20.5 22.5 21.5 22" fill="none" stroke="#B05010" stroke-width="0.8"/>
  <!-- Whiskers -->
  <line x1="5" y1="19" x2="14" y2="19.5" stroke="#5A3010" stroke-width="0.8" opacity="0.7"/>
  <line x1="5" y1="21" x2="14" y2="21" stroke="#5A3010" stroke-width="0.8" opacity="0.7"/>
  <line x1="35" y1="19" x2="26" y2="19.5" stroke="#5A3010" stroke-width="0.8" opacity="0.7"/>
  <line x1="35" y1="21" x2="26" y2="21" stroke="#5A3010" stroke-width="0.8" opacity="0.7"/>
</svg>
