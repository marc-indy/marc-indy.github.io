<!-- Marie — lunettes rondes, chignon strict, veste administrative bleue. 40×40 viewBox, style badge officiel -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="marieHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4A3728"/>
      <stop offset="1" stop-color="#2C1E12"/>
    </linearGradient>
  </defs>
  <!-- Badge background — rounded square, blue administrative -->
  <rect width="40" height="40" rx="8" fill="#3498DB"/>
  <rect x="1.5" y="1.5" width="37" height="37" rx="7" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <!-- Shoulders / jacket -->
  <path d="M5 40 C5 28 10 26 20 26 C30 26 35 28 35 40 Z" fill="#2175A5"/>
  <!-- Collar / white shirt -->
  <path d="M15 28 L20 32 L25 28" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Neck -->
  <rect x="17" y="22" width="6" height="6" rx="2" fill="#FDDCAC"/>
  <!-- Head -->
  <ellipse cx="20" cy="18" rx="10" ry="11" fill="#FDDCAC"/>
  <!-- Chignon (bun on top) -->
  <circle cx="20" cy="7" r="6" fill="url(#marieHair)" stroke="#2C1E12" stroke-width="0.5"/>
  <circle cx="20" cy="8" r="4" fill="#2C1E12" opacity="0.3"/>
  <!-- Bun hairpin -->
  <line x1="16" y1="7" x2="24" y2="7" stroke="#C0A060" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hair framing face -->
  <path d="M10 16 C10 8 14 6 20 6 C26 6 30 8 30 16" fill="url(#marieHair)"/>
  <!-- Face — Eyes with round glasses -->
  <!-- Left glasses frame -->
  <circle cx="15.5" cy="18" r="4" fill="none" stroke="#2C3E50" stroke-width="1.5"/>
  <circle cx="15.5" cy="18" r="2.5" fill="#D4EEFF" opacity="0.6"/>
  <!-- Eye inside -->
  <circle cx="15.5" cy="18" r="1.5" fill="#3D2B1F"/>
  <circle cx="15" cy="17.5" r="0.5" fill="#FFFFFF"/>
  <!-- Right glasses frame -->
  <circle cx="24.5" cy="18" r="4" fill="none" stroke="#2C3E50" stroke-width="1.5"/>
  <circle cx="24.5" cy="18" r="2.5" fill="#D4EEFF" opacity="0.6"/>
  <!-- Eye inside -->
  <circle cx="24.5" cy="18" r="1.5" fill="#3D2B1F"/>
  <circle cx="24" cy="17.5" r="0.5" fill="#FFFFFF"/>
  <!-- Glasses bridge -->
  <line x1="19.5" y1="18" x2="20.5" y2="18" stroke="#2C3E50" stroke-width="1.5"/>
  <!-- Glasses temples -->
  <line x1="11.5" y1="18" x2="10" y2="17" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="28.5" y1="18" x2="30" y2="17" stroke="#2C3E50" stroke-width="1.5"/>
  <!-- Nose -->
  <path d="M19.5 20 C19 21.5 20 22 20.5 21.5" fill="none" stroke="#C9A07A" stroke-width="0.8"/>
  <!-- Small professional smile -->
  <path d="M17 23.5 C18 24.5 22 24.5 23 23.5" fill="none" stroke="#C07850" stroke-width="1.2" stroke-linecap="round"/>
</svg>
