<!-- Écran téléphone rétro, 3 numéros à sélectionner, style années 80-90. 200×80px -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <defs>
    <linearGradient id="phoneBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4A5568"/>
      <stop offset="1" stop-color="#2D3748"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#001A00"/>
      <stop offset="1" stop-color="#00300A"/>
    </linearGradient>
  </defs>

  <!-- Phone border / bezel -->
  <rect width="200" height="80" rx="6" fill="url(#phoneBody)" stroke="#3A4455" stroke-width="2"/>
  <!-- Inner chrome ring -->
  <rect x="2" y="2" width="196" height="76" rx="5" fill="none" stroke="#6B7B8E" stroke-width="1" opacity="0.5"/>

  <!-- Main LCD screen area -->
  <rect x="8" y="6" width="184" height="44" rx="4" fill="url(#screenGlow)" stroke="#1A3020" stroke-width="1.5"/>
  <!-- Screen scanlines effect -->
  <rect x="8" y="6" width="184" height="44" rx="4" fill="#00FF40" opacity="0.04"/>
  <!-- Screen glare -->
  <path d="M12 8 C30 7 50 8 52 10 C50 12 30 12 12 10 Z" fill="#FFFFFF" opacity="0.06"/>

  <!-- Phone line display — 3 numbers in LCD green -->
  <!-- Number slot 1 -->
  <g transform="translate(12 10)">
    <!-- Label -->
    <text x="0" y="10" fill="#00AA30" font-family="monospace" font-size="8" opacity="0.7">1</text>
    <text x="8" y="10" fill="#00FF50" font-family="monospace" font-size="9" font-weight="bold">01 23 45 67 89</text>
    <!-- Divider line -->
    <line x1="0" y1="13" x2="176" y2="13" stroke="#00AA30" stroke-width="0.5" opacity="0.5"/>
    <!-- Number slot 2 -->
    <text x="0" y="24" fill="#00AA30" font-family="monospace" font-size="8" opacity="0.7">2</text>
    <text x="8" y="24" fill="#00FF50" font-family="monospace" font-size="9" font-weight="bold">06 78 90 12 34</text>
    <line x1="0" y1="27" x2="176" y2="27" stroke="#00AA30" stroke-width="0.5" opacity="0.5"/>
    <!-- Number slot 3 -->
    <text x="0" y="38" fill="#00AA30" font-family="monospace" font-size="8" opacity="0.7">3</text>
    <text x="8" y="38" fill="#00FF50" font-family="monospace" font-size="9" font-weight="bold">02 55 44 33 22</text>
  </g>

  <!-- Bottom button row — 1, 2, 3 selector buttons -->
  <!-- Button 1 -->
  <g transform="translate(16 55)">
    <rect width="48" height="20" rx="4" fill="#3D5166" stroke="#5A7080" stroke-width="1.5"/>
    <!-- Button highlight top edge -->
    <rect x="2" y="1" width="44" height="3" rx="2" fill="#6A8090" opacity="0.5"/>
    <text x="24" y="14" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="12" font-weight="bold">1</text>
  </g>
  <!-- Button 2 -->
  <g transform="translate(76 55)">
    <rect width="48" height="20" rx="4" fill="#3D5166" stroke="#5A7080" stroke-width="1.5"/>
    <rect x="2" y="1" width="44" height="3" rx="2" fill="#6A8090" opacity="0.5"/>
    <text x="24" y="14" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="12" font-weight="bold">2</text>
  </g>
  <!-- Button 3 -->
  <g transform="translate(136 55)">
    <rect width="48" height="20" rx="4" fill="#3D5166" stroke="#5A7080" stroke-width="1.5"/>
    <rect x="2" y="1" width="44" height="3" rx="2" fill="#6A8090" opacity="0.5"/>
    <text x="24" y="14" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="12" font-weight="bold">3</text>
  </g>

  <!-- Decorative LED indicators top-right -->
  <circle cx="182" cy="14" r="3" fill="#27AE60" opacity="0.9"/>
  <circle cx="190" cy="14" r="3" fill="#E74C3C" opacity="0.9"/>
  <!-- Blinking cursor on line 3 -->
  <rect x="157" y="40" width="6" height="9" rx="1" fill="#00FF50" opacity="0.8"/>
</svg>
