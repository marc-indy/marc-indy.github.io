<!-- Jean-Claude — homme 50 ans, cravate bordeaux, téléphone à l'oreille, sourcils froncés. 40×40, badge officiel -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="jcHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7A7070"/>
      <stop offset="1" stop-color="#5A5050"/>
    </linearGradient>
  </defs>
  <!-- Badge background — gray, corporate -->
  <rect width="40" height="40" rx="8" fill="#5D6D7E"/>
  <rect x="1.5" y="1.5" width="37" height="37" rx="7" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  <!-- Jacket shoulders -->
  <path d="M4 40 C4 27 9 25 20 25 C31 25 36 27 36 40 Z" fill="#2C3E50"/>
  <!-- Shirt white collar -->
  <path d="M14 27 L20 31 L26 27" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Tie — bordeaux/maroon -->
  <path d="M20 29 L18 32 L20 40 L22 32 Z" fill="#7B2D3E"/>
  <path d="M18.5 29.5 L21.5 29.5 L20.5 31 L19.5 31 Z" fill="#9B3D4E"/>
  <!-- Neck -->
  <rect x="17.5" y="22" width="5" height="5" rx="2" fill="#E8A878"/>
  <!-- Head — slightly older, wider jaw -->
  <ellipse cx="20" cy="18" rx="11" ry="11" fill="#E8A878"/>
  <!-- Hair — salt-and-pepper, receding slightly -->
  <path d="M9 16 C9 7 14 5 20 5 C26 5 31 7 31 16 L31 12 C31 8 28 5 20 5 C12 5 9 8 9 12 Z" fill="url(#jcHair)"/>
  <!-- Small balding patch on top -->
  <ellipse cx="20" cy="9" rx="5" ry="4" fill="#E8A878"/>
  <!-- Furrowed eyebrows — thick, concerned -->
  <path d="M12 15 C14 13.5 17 14 17.5 15.5" fill="none" stroke="#5A5050" stroke-width="2" stroke-linecap="round"/>
  <path d="M22.5 15.5 C23 14 26 13.5 28 15" fill="none" stroke="#5A5050" stroke-width="2" stroke-linecap="round"/>
  <!-- Eyes — slightly narrowed from frown -->
  <ellipse cx="15.5" cy="18" rx="2.5" ry="2" fill="#3D2B1F"/>
  <circle cx="14.8" cy="17.5" r="0.6" fill="#FFFFFF"/>
  <ellipse cx="24.5" cy="18" rx="2.5" ry="2" fill="#3D2B1F"/>
  <circle cx="23.8" cy="17.5" r="0.6" fill="#FFFFFF"/>
  <!-- Nose — broader -->
  <path d="M19 20 C18.5 22 20 22.5 21 22 C22 21.5 21 20" fill="#D09060" opacity="0.5"/>
  <!-- Slight amicable mouth despite frown -->
  <path d="M16.5 24.5 C18 25.5 22 25.5 23.5 24.5" fill="none" stroke="#B07850" stroke-width="1.2" stroke-linecap="round"/>
  <!-- PHONE at right ear -->
  <g transform="translate(28 13)">
    <rect width="8" height="13" rx="2" fill="#2C3E50" stroke="#1A252F" stroke-width="0.5"/>
    <rect x="1.5" y="2" width="5" height="7" rx="1" fill="#3D5166"/>
    <rect x="2.5" y="2.5" width="3" height="1" rx="0.5" fill="#7F8C8D"/>
    <circle cx="4" cy="11.5" r="1.2" fill="#1A252F"/>
  </g>
</svg>
