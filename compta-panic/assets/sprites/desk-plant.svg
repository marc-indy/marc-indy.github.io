<!-- Plante de bureau — petit pot avec succulent. 40×50 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 50" width="40" height="50">
  <defs>
    <linearGradient id="plantPot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D35400"/>
      <stop offset="1" stop-color="#A04000"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="20" cy="48" rx="14" ry="3" fill="#2C3E50" opacity="0.12"/>
  <!-- Pot -->
  <path d="M8 32 L12 46 L28 46 L32 32 Z" fill="url(#plantPot)" stroke="#8B3A00" stroke-width="1.5"/>
  <!-- Pot rim -->
  <rect x="6" y="30" width="28" height="4" rx="2" fill="#D35400" stroke="#8B3A00" stroke-width="1"/>
  <!-- Soil -->
  <ellipse cx="20" cy="33" rx="11" ry="3" fill="#5D4037"/>
  <!-- Succulent — main rosette -->
  <g transform="translate(20 24)">
    <!-- Bottom leaves (wider) -->
    <ellipse cx="-8" cy="2" rx="7" ry="4" fill="#27AE60" stroke="#1D8348" stroke-width="0.8" transform="rotate(-30)"/>
    <ellipse cx="8" cy="2" rx="7" ry="4" fill="#27AE60" stroke="#1D8348" stroke-width="0.8" transform="rotate(30)"/>
    <ellipse cx="0" cy="5" rx="6" ry="4" fill="#2ECC71" stroke="#1D8348" stroke-width="0.8"/>
    <!-- Middle leaves -->
    <ellipse cx="-5" cy="-2" rx="5.5" ry="3.5" fill="#2ECC71" stroke="#1D8348" stroke-width="0.8" transform="rotate(-20)"/>
    <ellipse cx="5" cy="-2" rx="5.5" ry="3.5" fill="#2ECC71" stroke="#1D8348" stroke-width="0.8" transform="rotate(20)"/>
    <!-- Top leaves (small, upright) -->
    <ellipse cx="-3" cy="-6" rx="4" ry="3" fill="#58D68D" stroke="#27AE60" stroke-width="0.8" transform="rotate(-15)"/>
    <ellipse cx="3" cy="-6" rx="4" ry="3" fill="#58D68D" stroke="#27AE60" stroke-width="0.8" transform="rotate(15)"/>
    <!-- Center bud -->
    <ellipse cx="0" cy="-8" rx="3" ry="2.5" fill="#82E0AA" stroke="#27AE60" stroke-width="0.6"/>
    <!-- Leaf veins (subtle) -->
    <line x1="-6" y1="0" x2="-2" y2="-2" stroke="#1D8348" stroke-width="0.4" opacity="0.4"/>
    <line x1="6" y1="0" x2="2" y2="-2" stroke="#1D8348" stroke-width="0.4" opacity="0.4"/>
  </g>
</svg>
