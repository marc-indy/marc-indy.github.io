<!-- Mme Lefèvre — femme 45 ans, tailleur chic anthracite, sourire carnassier, boucles d'oreilles perles. 40×40, badge officiel -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="lefHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2C2C2C"/>
      <stop offset="1" stop-color="#181818"/>
    </linearGradient>
  </defs>
  <!-- Badge background — dark anthracite, powerful -->
  <rect width="40" height="40" rx="8" fill="#2C3E50"/>
  <rect x="1.5" y="1.5" width="37" height="37" rx="7" fill="none" stroke="#BDC3C7" stroke-width="1.5" opacity="0.5"/>
  <!-- Tailored jacket shoulders — anthracite -->
  <path d="M3 40 C3 26 8 24 20 24 C32 24 37 26 37 40 Z" fill="#1E2A38"/>
  <!-- Jacket lapels / sharp collar -->
  <path d="M14.5 26 L17 24 L20 28 L23 24 L25.5 26" fill="#243448" stroke="#34495E" stroke-width="0.5"/>
  <!-- White blouse peeking above collar -->
  <line x1="18" y1="25" x2="22" y2="25" stroke="#ECF0F1" stroke-width="2" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="17.5" y="22" width="5" height="5" rx="2" fill="#F5C8A0"/>
  <!-- Head — strong jaw, refined -->
  <ellipse cx="20" cy="17.5" rx="10" ry="11" fill="#F5C8A0"/>
  <!-- Sleek dark hair — smooth, styled bob -->
  <path d="M10 16 C10 8 14 5 20 5 C26 5 30 8 30 16 L28 14 C26 8 22 6 20 6 C18 6 14 8 12 14 Z" fill="url(#lefHair)"/>
  <!-- Bob cut below ears -->
  <path d="M10 16 C10 20 11 22 12 22 C12 20 11 18 12 16Z" fill="url(#lefHair)"/>
  <path d="M30 16 C30 20 29 22 28 22 C28 20 29 18 28 16Z" fill="url(#lefHair)"/>
  <!-- Eyebrows — sharp, confident arched -->
  <path d="M12 14 C13.5 12.5 17 13 17.5 14" fill="none" stroke="#181818" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M22.5 14 C23 13 26.5 12.5 28 14" fill="none" stroke="#181818" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Eyes — sharp, assessing -->
  <ellipse cx="15.5" cy="17.5" rx="2.5" ry="2.5" fill="#FFFFFF"/>
  <circle cx="15.5" cy="17.5" r="1.8" fill="#2C3E1A"/>
  <circle cx="14.9" cy="16.9" r="0.6" fill="#FFFFFF"/>
  <ellipse cx="24.5" cy="17.5" rx="2.5" ry="2.5" fill="#FFFFFF"/>
  <circle cx="24.5" cy="17.5" r="1.8" fill="#2C3E1A"/>
  <circle cx="23.9" cy="16.9" r="0.6" fill="#FFFFFF"/>
  <!-- Carnivorous smile — wide, knowing -->
  <path d="M15 23.5 C16.5 25.5 23.5 25.5 25 23.5" fill="#E8B090" stroke="#B07050" stroke-width="0.8"/>
  <path d="M15 23.5 C16.5 25 23.5 25 25 23.5" fill="none" stroke="#C07850" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Teeth — just a hint -->
  <path d="M16.5 24.2 C18 25 22 25 23.5 24.2" fill="#FFFFFF" opacity="0.6"/>
  <!-- Nose — elegant -->
  <path d="M19.5 20 C19 21.5 20.5 22 21 21.5" fill="none" stroke="#D0A070" stroke-width="0.8"/>
  <!-- Pearl earrings -->
  <circle cx="10" cy="20" r="3" fill="#F0EEF0" stroke="#D0CCD0" stroke-width="1"/>
  <circle cx="10" cy="20" r="1.5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="30" cy="20" r="3" fill="#F0EEF0" stroke="#D0CCD0" stroke-width="1"/>
  <circle cx="30" cy="20" r="1.5" fill="#FFFFFF" opacity="0.8"/>
</svg>
