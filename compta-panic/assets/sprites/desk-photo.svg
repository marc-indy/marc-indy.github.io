<!-- Photo de bureau — cadre avec silhouettes de famille. 35×40 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 35 40" width="35" height="40">
  <defs>
    <linearGradient id="photoFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DAA520"/>
      <stop offset="1" stop-color="#B8860B"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="17.5" cy="39" rx="10" ry="2" fill="#2C3E50" opacity="0.12"/>
  <!-- Frame stand (back) -->
  <path d="M14 38 L17.5 22 L21 38" fill="#8B6914" stroke="#6B5510" stroke-width="0.8"/>
  <!-- Frame -->
  <rect x="2" y="2" width="31" height="34" rx="2" fill="url(#photoFrame)" stroke="#8B6914" stroke-width="2"/>
  <!-- Inner border -->
  <rect x="5" y="5" width="25" height="28" rx="1" fill="#FFFFFF" stroke="#D4C088" stroke-width="1"/>
  <!-- Photo background (warm room) -->
  <rect x="6" y="6" width="23" height="26" fill="#FFF8E7"/>
  <!-- Family silhouettes -->
  <!-- Parent 1 (taller) -->
  <ellipse cx="12" cy="16" rx="3.5" ry="4" fill="#7F8C8D"/>
  <rect x="9" y="20" width="6" height="10" rx="2" fill="#7F8C8D"/>
  <!-- Parent 2 -->
  <ellipse cx="22" cy="17" rx="3" ry="3.5" fill="#95A5A6"/>
  <rect x="19.5" y="20.5" width="5" height="9" rx="2" fill="#95A5A6"/>
  <!-- Child (small) -->
  <ellipse cx="17" cy="22" rx="2.5" ry="3" fill="#BDC3C7"/>
  <rect x="15" y="25" width="4" height="6" rx="1.5" fill="#BDC3C7"/>
  <!-- Heart above (love / warmth) -->
  <path d="M16 10 C16 8 18 7 17.5 9 C17 7 19 8 19 10 C19 12 17.5 13 17.5 13 C17.5 13 16 12 16 10 Z" fill="#E74C3C" opacity="0.4"/>
</svg>
