<!-- Icône perk générique — hybride tasse café / étoile. 32×32 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="perkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F1C40F"/>
      <stop offset="1" stop-color="#D4A017"/>
    </linearGradient>
  </defs>
  <!-- Coffee cup base -->
  <path d="M7 14 L9 26 C9 28 12 29 16 29 C20 29 23 28 23 26 L25 14 Z" fill="#FFFDF8" stroke="#2C3E50" stroke-width="2"/>
  <!-- Cup handle -->
  <path d="M25 16 C29 16 30 20 27 22" fill="none" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
  <!-- Coffee surface -->
  <ellipse cx="16" cy="15" rx="9" ry="2.5" fill="#8B6B4A" opacity="0.4"/>
  <!-- Star rising from cup (like steam but a star) -->
  <polygon points="16,3 17.5,8 22,8.5 18.5,11 19.5,16 16,13.5 12.5,16 13.5,11 10,8.5 14.5,8" fill="url(#perkGrad)" stroke="#B8860B" stroke-width="1"/>
  <!-- Sparkle dots -->
  <circle cx="10" cy="6" r="1" fill="#F1C40F" opacity="0.6"/>
  <circle cx="22" cy="5" r="0.8" fill="#F1C40F" opacity="0.5"/>
  <circle cx="8" cy="10" r="0.6" fill="#DAA520" opacity="0.4"/>
  <!-- Cup accent line -->
  <line x1="11" y1="20" x2="11" y2="24" stroke="#E8D4A0" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
</svg>
