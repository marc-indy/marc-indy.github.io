<!-- Bouton Collection — classeur gris avec onglets colorés. 200×56 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" width="200" height="56">
  <defs>
    <linearGradient id="collCab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B9C5CD"/>
      <stop offset="1" stop-color="#95A5A6"/>
    </linearGradient>
    <filter id="collShadow" x="-5%" y="-10%" width="110%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#2C3E50" flood-opacity="0.2"/>
    </filter>
  </defs>
  <g filter="url(#collShadow)">
    <!-- Cabinet body -->
    <rect x="4" y="4" width="192" height="48" rx="6" fill="url(#collCab)" stroke="#6D7B88" stroke-width="2"/>
    <!-- Drawer lines -->
    <line x1="12" y1="20" x2="188" y2="20" stroke="#6D7B88" stroke-width="1" opacity="0.5"/>
    <line x1="12" y1="36" x2="188" y2="36" stroke="#6D7B88" stroke-width="1" opacity="0.5"/>
    <!-- Drawer handles -->
    <rect x="86" y="10" width="28" height="4" rx="2" fill="#6D7B88"/>
    <rect x="86" y="26" width="28" height="4" rx="2" fill="#6D7B88"/>
    <rect x="86" y="42" width="28" height="4" rx="2" fill="#6D7B88"/>
    <!-- Colored tabs sticking out top -->
    <rect x="24" y="0" width="20" height="8" rx="3" fill="#E74C3C"/>
    <rect x="52" y="0" width="20" height="8" rx="3" fill="#3498DB"/>
    <rect x="80" y="0" width="20" height="8" rx="3" fill="#27AE60"/>
    <rect x="108" y="0" width="20" height="8" rx="3" fill="#F1C40F"/>
    <rect x="136" y="0" width="20" height="8" rx="3" fill="#8E44AD"/>
    <rect x="164" y="0" width="20" height="8" rx="3" fill="#E67E22"/>
    <!-- Label area (text overlay for builder) -->
    <text x="100" y="52" text-anchor="middle" font-family="Nunito, sans-serif" font-size="1" fill="transparent">Collection</text>
  </g>
</svg>
