<!-- Tribunal — boiseries sombres, lampe de banquier verte, banc du juge surélevé, barre des témoins. 480×854 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 854" width="480" height="854">
  <defs>
    <linearGradient id="tribWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3E2723"/>
      <stop offset="0.6" stop-color="#5D4037"/>
      <stop offset="1" stop-color="#4E342E"/>
    </linearGradient>
    <linearGradient id="tribWood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8B4513"/>
      <stop offset="0.5" stop-color="#A0522D"/>
      <stop offset="1" stop-color="#6F3410"/>
    </linearGradient>
    <linearGradient id="tribBench" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5D3A1A"/>
      <stop offset="1" stop-color="#3E2723"/>
    </linearGradient>
    <linearGradient id="lampShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#27AE60"/>
      <stop offset="1" stop-color="#1D8348"/>
    </linearGradient>
    <linearGradient id="lampGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#FFF9D0" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#FFF9D0" stop-opacity="0"/>
    </linearGradient>
    <filter id="tribShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="tribGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="480" height="854" fill="#1A0E08"/>

  <!-- Wall with wood paneling -->
  <rect width="480" height="400" fill="url(#tribWall)"/>

  <!-- Wall panels (vertical wood strips) -->
  <g stroke="#3E2723" stroke-width="2" opacity="0.4">
    <line x1="60" y1="0" x2="60" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="180" y1="0" x2="180" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="420" y1="0" x2="420" y2="400"/>
  </g>

  <!-- Horizontal molding -->
  <rect y="100" width="480" height="8" fill="#6F3410" stroke="#3E2723" stroke-width="1"/>
  <rect y="250" width="480" height="8" fill="#6F3410" stroke="#3E2723" stroke-width="1"/>

  <!-- French Republic emblem (centered, on wall) -->
  <g transform="translate(210 30)" opacity="0.5">
    <circle cx="30" cy="30" r="25" fill="none" stroke="#DAA520" stroke-width="2"/>
    <text x="30" y="28" text-anchor="middle" font-family="Nunito, sans-serif" font-size="9" font-weight="800" fill="#DAA520">RF</text>
    <text x="30" y="40" text-anchor="middle" font-family="Nunito, sans-serif" font-size="5" fill="#DAA520">JUSTICE</text>
    <!-- Laurel branches -->
    <path d="M5 45 C10 35 15 30 20 28" stroke="#DAA520" stroke-width="1.5" fill="none"/>
    <path d="M55 45 C50 35 45 30 40 28" stroke="#DAA520" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Judge's bench (elevated, center) -->
  <g transform="translate(60 280)" filter="url(#tribShadow)">
    <!-- Elevated platform -->
    <rect x="-20" y="80" width="400" height="20" rx="4" fill="url(#tribBench)"/>
    <!-- Bench front -->
    <rect x="0" y="0" width="360" height="80" rx="6" fill="url(#tribWood)" stroke="#3E2723" stroke-width="2.5"/>
    <!-- Bench panel details -->
    <rect x="20" y="12" width="80" height="56" rx="4" fill="#6F3410" opacity="0.4"/>
    <rect x="120" y="12" width="120" height="56" rx="4" fill="#6F3410" opacity="0.4"/>
    <rect x="260" y="12" width="80" height="56" rx="4" fill="#6F3410" opacity="0.4"/>
    <!-- Gold trim on bench -->
    <line x1="10" y1="6" x2="350" y2="6" stroke="#DAA520" stroke-width="2" opacity="0.5"/>
    <line x1="10" y1="74" x2="350" y2="74" stroke="#DAA520" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Banker's lamp (on bench) -->
  <g transform="translate(200 230)" filter="url(#tribGlow)">
    <!-- Base -->
    <ellipse cx="40" cy="48" rx="20" ry="5" fill="#8B4513"/>
    <!-- Stem -->
    <rect x="37" y="20" width="6" height="30" rx="2" fill="#B8860B"/>
    <!-- Green glass shade -->
    <path d="M16 20 C16 10 64 10 64 20 L60 28 L20 28 Z" fill="url(#lampShade)" stroke="#1D8348" stroke-width="1.5"/>
    <!-- Light glow -->
    <ellipse cx="40" cy="22" rx="18" ry="6" fill="#FFF9A0" opacity="0.5"/>
    <!-- Light cone below -->
    <polygon points="20,28 60,28 80,120 0,120" fill="url(#lampGlow)" opacity="0.15"/>
  </g>

  <!-- Floor (dark polished wood) -->
  <rect y="400" width="480" height="454" fill="#2C1810"/>
  <!-- Floor boards -->
  <g stroke="#3E2218" stroke-width="1" opacity="0.3">
    <line x1="0" y1="470" x2="480" y2="470"/>
    <line x1="0" y1="540" x2="480" y2="540"/>
    <line x1="0" y1="610" x2="480" y2="610"/>
    <line x1="0" y1="680" x2="480" y2="680"/>
    <line x1="0" y1="750" x2="480" y2="750"/>
    <line x1="0" y1="820" x2="480" y2="820"/>
    <line x1="120" y1="400" x2="120" y2="854"/>
    <line x1="240" y1="400" x2="240" y2="854"/>
    <line x1="360" y1="400" x2="360" y2="854"/>
  </g>

  <!-- Witness stand (left) -->
  <g transform="translate(20 450)" filter="url(#tribShadow)">
    <rect width="120" height="140" rx="6" fill="url(#tribWood)" stroke="#3E2723" stroke-width="2"/>
    <rect x="10" y="10" width="100" height="60" rx="4" fill="#6F3410" opacity="0.4"/>
    <!-- Railing on top -->
    <rect x="-5" y="-8" width="130" height="10" rx="3" fill="#5D3A1A" stroke="#3E2723" stroke-width="1.5"/>
  </g>

  <!-- Defense table (right) -->
  <g transform="translate(300 520)" filter="url(#tribShadow)">
    <rect width="160" height="60" rx="4" fill="url(#tribWood)" stroke="#3E2723" stroke-width="2"/>
    <rect x="10" y="8" width="60" height="44" rx="3" fill="#6F3410" opacity="0.3"/>
    <!-- Papers on table -->
    <g transform="translate(80 8) rotate(-5)">
      <rect width="50" height="40" rx="2" fill="#FFFDF8" stroke="#D8D0C1" stroke-width="1"/>
      <line x1="6" y1="12" x2="44" y2="12" stroke="#D8D0C1" stroke-width="1.5"/>
      <line x1="6" y1="22" x2="38" y2="22" stroke="#D8D0C1" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Gavel on bench surface -->
  <g transform="translate(280 268) rotate(-15)">
    <rect x="0" y="6" width="5" height="28" rx="1.5" fill="#8B4513"/>
    <rect x="-5" y="0" width="15" height="10" rx="3" fill="#5D3A1A" stroke="#3E2723" stroke-width="1"/>
  </g>

  <!-- Somber ambient overlay -->
  <rect width="480" height="854" fill="#1A0E08" opacity="0.15"/>

  <!-- Vignette effect -->
  <rect width="480" height="854" fill="url(#lampGlow)" opacity="0" rx="0"/>
  <ellipse cx="240" cy="350" rx="180" ry="200" fill="#FFF9D0" opacity="0.04"/>
</svg>
