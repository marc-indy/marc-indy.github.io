<!-- Écran titre — bureau vu de dessus, coloré, papiers éparpillés, café, calculatrice, téléphone, dossiers. 480×854 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 854" width="480" height="854">
  <defs>
    <linearGradient id="titleWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F3E7"/>
      <stop offset="1" stop-color="#E7DBC3"/>
    </linearGradient>
    <linearGradient id="titleDesk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8C088"/>
      <stop offset="0.5" stop-color="#D4A060"/>
      <stop offset="1" stop-color="#C08840"/>
    </linearGradient>
    <linearGradient id="titleFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8D5930"/>
      <stop offset="1" stop-color="#6F4324"/>
    </linearGradient>
    <linearGradient id="titleGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF4B0"/>
      <stop offset="0.5" stop-color="#F1C40F"/>
      <stop offset="1" stop-color="#DAA520"/>
    </linearGradient>
    <filter id="titleShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#2C3E50" flood-opacity="0.2"/>
    </filter>
    <filter id="titleSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2C3E50" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Wall -->
  <rect width="480" height="854" fill="#FFF8E7"/>
  <rect width="480" height="200" fill="url(#titleWall)"/>
  <path d="M0 160 C120 142 200 198 310 176 C380 160 440 142 480 155 L480 200 L0 200 Z" fill="#EFE4CF" opacity="0.9"/>

  <!-- Wall molding -->
  <rect y="196" width="480" height="10" fill="#C49463"/>

  <!-- Desk surface -->
  <rect y="206" width="480" height="648" fill="url(#titleDesk)"/>
  <rect y="206" width="480" height="648" fill="#FFF0D8" opacity="0.1"/>

  <!-- Wood grain -->
  <g opacity="0.2" stroke="#8D5D38" stroke-width="1.5" fill="none">
    <path d="M-20 260 C100 240 200 280 320 258 C400 244 460 250 520 268"/>
    <path d="M-20 370 C90 342 190 400 310 378 C390 364 440 368 520 386"/>
    <path d="M-10 500 C90 472 200 538 318 518 C390 504 450 508 520 526"/>
    <path d="M-16 640 C80 614 180 666 306 648 C398 636 448 634 524 652"/>
  </g>

  <!-- Desk front edge -->
  <path d="M0 788 C130 770 220 820 338 796 C406 782 448 786 480 798 L480 854 L0 854 Z" fill="url(#titleFront)"/>

  <!-- === DESK OBJECTS === -->

  <!-- Filing cabinet edge (left wall) -->
  <g transform="translate(-10 20)" filter="url(#titleShadow)">
    <rect width="60" height="180" rx="4" fill="#B9C5CD" stroke="#6D7B88" stroke-width="2"/>
    <rect x="6" y="12" width="48" height="30" rx="3" fill="#AAB5BE"/>
    <rect x="6" y="52" width="48" height="30" rx="3" fill="#AAB5BE"/>
    <rect x="6" y="92" width="48" height="30" rx="3" fill="#AAB5BE"/>
    <rect x="6" y="132" width="48" height="30" rx="3" fill="#AAB5BE"/>
    <circle cx="30" cy="27" r="3" fill="#6D7B88"/>
    <circle cx="30" cy="67" r="3" fill="#6D7B88"/>
    <circle cx="30" cy="107" r="3" fill="#6D7B88"/>
    <circle cx="30" cy="147" r="3" fill="#6D7B88"/>
  </g>

  <!-- Stack of colorful folders (top-left of desk) -->
  <g transform="translate(60 240) rotate(-5)" filter="url(#titleSoft)">
    <rect width="80" height="12" rx="3" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
    <rect y="14" width="84" height="12" rx="3" fill="#3498DB" stroke="#2175A5" stroke-width="1"/>
    <rect y="28" width="78" height="12" rx="3" fill="#27AE60" stroke="#1D8348" stroke-width="1"/>
    <rect y="42" width="82" height="12" rx="3" fill="#F1C40F" stroke="#D4A017" stroke-width="1"/>
    <rect y="56" width="76" height="12" rx="3" fill="#8E44AD" stroke="#6C3483" stroke-width="1"/>
  </g>

  <!-- Coffee mug with steam (right side) -->
  <g transform="translate(340 260)" filter="url(#titleShadow)">
    <ellipse cx="40" cy="52" rx="28" ry="8" fill="#8D5930" opacity="0.15"/>
    <circle cx="40" cy="30" r="24" fill="#FFFDF9" stroke="#2C3E50" stroke-width="2.5"/>
    <circle cx="40" cy="30" r="16" fill="#7D4C28"/>
    <circle cx="40" cy="30" r="10" fill="#9B633A" opacity="0.5"/>
    <path d="M63 24 C76 22 78 40 63 41" fill="none" stroke="#2C3E50" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Steam -->
    <path d="M32 4 C28 -8 38 -8 36 -18" stroke="#D9D3C9" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M44 2 C40 -10 50 -9 48 -20" stroke="#D9D3C9" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.45"/>
    <path d="M38 6 C36 -4 44 -3 42 -14" stroke="#D9D3C9" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- Calculator (left-center) -->
  <g transform="translate(50 420) rotate(-8)" filter="url(#titleShadow)">
    <rect width="66" height="90" rx="6" fill="#2C3E50" stroke="#17212B" stroke-width="2.5"/>
    <rect x="8" y="8" width="50" height="18" rx="3" fill="#405B39"/>
    <text x="54" y="22" text-anchor="end" font-family="Courier Prime, monospace" font-size="13" fill="#8EF7A6">42069</text>
    <g fill="#B7C0C7">
      <rect x="8" y="32" width="11" height="9" rx="2"/>
      <rect x="24" y="32" width="11" height="9" rx="2"/>
      <rect x="40" y="32" width="11" height="9" rx="2"/>
      <rect x="8" y="46" width="11" height="9" rx="2"/>
      <rect x="24" y="46" width="11" height="9" rx="2"/>
      <rect x="40" y="46" width="11" height="9" rx="2"/>
      <rect x="8" y="60" width="11" height="9" rx="2"/>
      <rect x="24" y="60" width="11" height="9" rx="2"/>
      <rect x="40" y="60" width="11" height="9" rx="2" fill="#E67E22"/>
      <rect x="8" y="74" width="27" height="9" rx="2"/>
      <rect x="40" y="74" width="11" height="9" rx="2" fill="#2ECC71"/>
    </g>
  </g>

  <!-- Desk phone (center-right) -->
  <g transform="translate(320 440) rotate(6)" filter="url(#titleShadow)">
    <rect x="0" y="20" width="80" height="30" rx="6" fill="#4A4A4A" stroke="#1A1A1A" stroke-width="2"/>
    <!-- Keypad -->
    <g fill="#5A5A5A">
      <rect x="16" y="26" width="10" height="6" rx="1.5"/>
      <rect x="30" y="26" width="10" height="6" rx="1.5"/>
      <rect x="44" y="26" width="10" height="6" rx="1.5"/>
      <rect x="16" y="36" width="10" height="6" rx="1.5"/>
      <rect x="30" y="36" width="10" height="6" rx="1.5"/>
      <rect x="44" y="36" width="10" height="6" rx="1.5"/>
    </g>
    <!-- Handset -->
    <path d="M6 20 C6 12 14 4 22 4 L58 4 C66 4 74 12 74 20" fill="none" stroke="#3A3A3A" stroke-width="6" stroke-linecap="round"/>
    <ellipse cx="10" cy="16" rx="8" ry="6" fill="#2C2C2C"/>
    <ellipse cx="70" cy="16" rx="8" ry="6" fill="#2C2C2C"/>
    <!-- Red LED -->
    <circle cx="8" cy="34" r="3" fill="#E74C3C"/>
    <circle cx="8" cy="34" r="1.5" fill="#FF6B6B"/>
  </g>

  <!-- Scattered papers (5 papers at various angles) -->
  <g filter="url(#titleSoft)">
    <!-- Paper 1 -->
    <g transform="translate(180 310) rotate(-12)">
      <rect width="70" height="90" rx="3" fill="#FFFDF8" stroke="#E7DAC8" stroke-width="1.5"/>
      <line x1="10" y1="20" x2="60" y2="20" stroke="#D8D0C1" stroke-width="2" stroke-linecap="round"/>
      <line x1="10" y1="34" x2="55" y2="34" stroke="#D8D0C1" stroke-width="2" stroke-linecap="round"/>
      <line x1="10" y1="48" x2="50" y2="48" stroke="#D8D0C1" stroke-width="2" stroke-linecap="round"/>
      <line x1="10" y1="62" x2="42" y2="62" stroke="#D8D0C1" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- Paper 2 (with red stamp) -->
    <g transform="translate(280 530) rotate(15)">
      <rect width="60" height="78" rx="3" fill="#FFFDF8" stroke="#E7DAC8" stroke-width="1.5"/>
      <line x1="8" y1="16" x2="52" y2="16" stroke="#D8D0C1" stroke-width="2" stroke-linecap="round"/>
      <line x1="8" y1="28" x2="48" y2="28" stroke="#D8D0C1" stroke-width="2" stroke-linecap="round"/>
      <circle cx="40" cy="55" r="12" fill="none" stroke="#E74C3C" stroke-width="2" opacity="0.5"/>
      <text x="40" y="58" text-anchor="middle" font-family="Courier Prime, monospace" font-size="6" fill="#E74C3C" opacity="0.6">OK</text>
    </g>
    <!-- Paper 3 -->
    <g transform="translate(140 620) rotate(-7)">
      <rect width="55" height="72" rx="3" fill="#FFFDF8" stroke="#E7DAC8" stroke-width="1.5"/>
      <rect x="0" y="0" width="55" height="12" rx="3" fill="#3498DB" opacity="0.3"/>
      <line x1="8" y1="24" x2="44" y2="24" stroke="#D8D0C1" stroke-width="2" stroke-linecap="round"/>
      <line x1="8" y1="36" x2="38" y2="36" stroke="#D8D0C1" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Sticky notes (colorful cluster) -->
  <g filter="url(#titleSoft)">
    <!-- Yellow sticky -->
    <g transform="translate(410 500) rotate(4)">
      <rect width="60" height="54" rx="2" fill="#F1C94B" stroke="#D7A92F" stroke-width="1.5"/>
      <path d="M42 54 L60 54 L60 38 Z" fill="#D9A928"/>
      <text x="8" y="18" font-family="Nunito, sans-serif" font-size="8" font-weight="700" fill="#2C3E50">TVA!!</text>
      <line x1="8" y1="28" x2="48" y2="28" stroke="#7B5B15" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
      <line x1="8" y1="38" x2="38" y2="38" stroke="#7B5B15" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
    </g>
    <!-- Pink sticky -->
    <g transform="translate(390 560) rotate(-6)">
      <rect width="52" height="48" rx="2" fill="#F5B7B1" stroke="#E6867D" stroke-width="1"/>
      <text x="6" y="16" font-family="Nunito, sans-serif" font-size="7" font-weight="600" fill="#922B21">URGENT</text>
      <line x1="6" y1="26" x2="42" y2="26" stroke="#922B21" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
    </g>
    <!-- Green sticky -->
    <g transform="translate(430 470) rotate(8)">
      <rect width="48" height="44" rx="2" fill="#A9DFBF" stroke="#7DCEA0" stroke-width="1"/>
      <line x1="6" y1="14" x2="38" y2="14" stroke="#1D8348" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
      <line x1="6" y1="24" x2="32" y2="24" stroke="#1D8348" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Pen (diagonal) -->
  <g transform="translate(250 680) rotate(22)" filter="url(#titleSoft)">
    <rect width="90" height="8" rx="4" fill="#3483BF" stroke="#2C3E50" stroke-width="1.5"/>
    <rect width="20" height="8" rx="4" fill="#F3B34A"/>
    <polygon points="90,0 100,4 90,8" fill="#2C3E50"/>
    <line x1="12" y1="2" x2="18" y2="2" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Paper clip -->
  <g transform="translate(200 750) rotate(-14)" filter="url(#titleSoft)">
    <path d="M0 0 V20 C0 26 7 27 7 20 V5 C7 -1 14 -1 14 5 V22 C14 30 0 30 0 22" fill="none" stroke="#BCC2C6" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Rubber stamp (bottom-right) -->
  <g transform="translate(360 660) rotate(8)" filter="url(#titleShadow)">
    <ellipse cx="28" cy="40" rx="24" ry="6" fill="#2C3E50" opacity="0.12"/>
    <rect x="0" y="16" width="56" height="22" rx="5" fill="#80481F"/>
    <rect x="8" y="0" width="40" height="20" rx="8" fill="#2C3E50"/>
    <rect x="12" y="30" width="32" height="8" rx="3" fill="#E74C3C" opacity="0.5"/>
    <text x="28" y="36" text-anchor="middle" font-family="Nunito, sans-serif" font-size="6" font-weight="800" fill="#FFF8E7">VÉRIFIÉ</text>
  </g>

  <!-- Plant (top-right corner) -->
  <g transform="translate(420 210)" filter="url(#titleSoft)">
    <path d="M14 30 L16 42 L28 42 L30 30 Z" fill="#D35400" stroke="#8B3A00" stroke-width="1"/>
    <rect x="12" y="28" width="20" height="4" rx="2" fill="#D35400"/>
    <ellipse cx="22" cy="30" rx="8" ry="2" fill="#5D4037"/>
    <ellipse cx="18" cy="22" rx="5" ry="3" fill="#27AE60" stroke="#1D8348" stroke-width="0.6" transform="rotate(-15 18 22)"/>
    <ellipse cx="26" cy="22" rx="5" ry="3" fill="#27AE60" stroke="#1D8348" stroke-width="0.6" transform="rotate(15 26 22)"/>
    <ellipse cx="22" cy="18" rx="4" ry="2.5" fill="#2ECC71" stroke="#27AE60" stroke-width="0.5"/>
  </g>

  <!-- Warm ambient glow (subtle) -->
  <ellipse cx="240" cy="450" rx="200" ry="180" fill="#F1C40F" opacity="0.03"/>
</svg>
